name: Build Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Глобальные настройки для ускорения
env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=2"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Защита от зависших сборок
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Правильная версия Java для Forge 1.16.5
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      # ✅ Умное кэширование через официальный экшен Gradle
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          # Кэш будет автоматически инвалидирован при изменении зависимостей
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      # ✅ Единая команда сборки: очистка + билд без тестов
      # --parallel и workers уже заданы в GRADLE_OPTS
      - name: Build with Gradle
        run: ./gradlew clean build -x test --no-daemon

      # ✅ Загрузка артефактов (v4)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vs-global-build
          path: build/libs/vs-global-*.jar  # 🔍 Фильтр: только ваш мод, не sources/javadoc
          retention-days: 7
          if-no-files-found: error
          
      # ✅ Релиз по тегу
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/libs/vs-global-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ❌ УБРАН ШАГ: rm -rf ~/.gradle/caches/
      # Кэш должен сохраняться между сборками для скорости!
